<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfie2Anime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff6b9d, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #888;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .upload-zone {
            border: 2px dashed #3a3a5c;
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #1a1a2e;
            margin-bottom: 30px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #c084fc;
            background: #1e1e35;
        }

        .upload-zone.has-image {
            padding: 20px;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .upload-zone h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #c084fc;
        }

        .upload-zone p {
            color: #666;
            font-size: 0.9rem;
        }

        .btn {
            background: linear-gradient(135deg, #c084fc, #818cf8);
            color: white;
            border: none;
            padding: 14px 48px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(192, 132, 252, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-row {
            text-align: center;
            margin-bottom: 30px;
        }

        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 640px) {
            .results { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8rem; }
        }

        .result-card {
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
        }

        .result-card h3 {
            padding: 16px 20px 12px;
            font-size: 0.95rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-card img {
            width: 100%;
            display: block;
        }

        .preview-img {
            max-height: 400px;
            object-fit: contain;
            background: #111;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.95rem;
        }

        .download-row {
            text-align: center;
            margin-top: 20px;
        }

        .download-row a {
            color: #c084fc;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 30px;
            border: 2px solid #c084fc;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .download-row a:hover {
            background: #c084fc;
            color: #0f0f1a;
        }

        .gallery {
            margin-top: 50px;
        }

        .gallery h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #aaa;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .gallery-item {
            border-radius: 12px;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            display: block;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Selfie2Anime</h1>
        <p>Transform your photos into anime-style art using deep learning</p>
    </div>

    <div class="container">
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">&#x1f5bc;</div>
            <h3>Drop your selfie here</h3>
            <p>or click to browse &mdash; supports JPG, PNG, WebP</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">

        <div class="btn-row">
            <button class="btn" id="convertBtn" disabled onclick="convert()">Convert to Anime</button>
        </div>

        <div class="status" id="status"></div>

        <div class="results" id="results" style="display:none;">
            <div class="result-card">
                <h3>Original</h3>
                <img id="originalImg" class="preview-img">
            </div>
            <div class="result-card">
                <h3>Anime Style</h3>
                <img id="animeImg" class="preview-img">
            </div>
        </div>

        <div class="download-row" id="downloadRow" style="display:none;">
            <a id="downloadLink" href="#" download="anime_output.png">Download Result</a>
        </div>

        <div class="gallery">
            <h2>Example Results</h2>
            <div class="gallery-grid" id="galleryGrid"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        const originalImg = document.getElementById('originalImg');
        const animeImg = document.getElementById('animeImg');
        const downloadRow = document.getElementById('downloadRow');
        const downloadLink = document.getElementById('downloadLink');

        let selectedFile = null;

        // Drag and drop
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return;
            selectedFile = file;
            convertBtn.disabled = false;

            const url = URL.createObjectURL(file);
            originalImg.src = url;
            results.style.display = 'grid';
            animeImg.src = '';
            animeImg.style.opacity = '0.3';
            downloadRow.style.display = 'none';

            dropZone.classList.add('has-image');
            dropZone.innerHTML = '<h3>Image selected: ' + file.name + '</h3><p>Click to change</p>';
        }

        async function convert() {
            if (!selectedFile) return;

            convertBtn.disabled = true;
            status.innerHTML = '<span class="spinner"></span> Converting... this may take a few seconds';

            const formData = new FormData();
            formData.append('image', selectedFile);

            try {
                const resp = await fetch('/convert', { method: 'POST', body: formData });
                if (!resp.ok) throw new Error('Conversion failed');

                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);

                animeImg.src = url;
                animeImg.style.opacity = '1';
                downloadLink.href = url;
                downloadRow.style.display = 'block';
                status.textContent = 'Done!';
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
            }

            convertBtn.disabled = false;
        }

        // Load gallery examples
        const gallery = document.getElementById('galleryGrid');
        for (let i = 1; i <= 9; i++) {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            const img = document.createElement('img');
            img.src = '/static/examples/w' + i + '.jpg';
            img.alt = 'Example ' + i;
            img.loading = 'lazy';
            div.appendChild(img);
            gallery.appendChild(div);
        }
    </script>
</body>
</html>
